services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: smart_resume
      POSTGRES_USER: smartuser
      POSTGRES_PASSWORD: smartpass
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  smart-resume-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: smart-ai-resume:latest
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://smartuser:smartpass@postgres:5432/smart_resume
      AUTH_ENABLED: "true"
    depends_on:
      - postgres
    ports:
      - "8001:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    volumes:
      - ./outputs:/app/outputs
    command: ["python", "-m", "uvicorn", "smart_resume.api.app:app", "--host", "0.0.0.0", "--port", "8000"]

  smart-resume-cli:
    image: smart-ai-resume:latest
    profiles: ["cli"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://smartuser:smartpass@postgres:5432/smart_resume
    volumes:
      - ./outputs:/app/outputs
    depends_on:
      - postgres
      - smart-resume-api
    command: ["python", "-m", "smart_resume.cli", "--cv", "tests/fixtures/sample_cv.txt", "--jd", "tests/fixtures/sample_jd.txt"]

volumes:
  pgdata:
